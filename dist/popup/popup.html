<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>Northr</h1>
    <span>Identity</span>
  </div>

  <!-- Login State -->
  <div id="login-view" style="display:none;">
    <div class="login-form">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <button class="btn" id="login-btn">Sign In</button>
      <div class="error" id="login-error"></div>
      <a href="https://identity.northr.ai/signup" target="_blank" class="link">Don\'t have an account? Sign up</a>
    </div>
  </div>

  <!-- Main View -->
  <div id="main-view" style="display:none;">

    <div id="blocks-grid" class="blocks-grid"></div>

    <div id="edit-area" style="display:none;">
      <div class="edit-header">
        <span id="edit-title"></span>
        <span class="edit-close" id="edit-close">&times;</span>
      </div>
      <textarea id="edit-textarea" class="edit-textarea" placeholder="Write about yourself..."></textarea>
      <button class="btn" id="edit-save" style="width:100%;margin-top:6px;">Save</button>
    </div>

    <div class="sync-info" id="sync-info">Last synced: never</div>

    <div class="mode-badge" id="mode-badge">
      <span class="mode-icon">&#128274;</span>
      <div>
        <div class="mode-label">Local mode</div>
        <div class="mode-desc">Your data stays on this device</div>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn btn-secondary" id="refresh-btn" style="flex:1;">&#8635; Refresh</button>
      <button class="btn btn-secondary" id="dashboard-btn" style="flex:1;">Dashboard &#8599;</button>
    </div>

    <button class="btn btn-secondary" id="logout-btn" style="width:100%;margin-top:8px;">Sign Out</button>
  </div>

  <!-- Loading State -->
  <div id="loading-view">
    <div style="text-align:center;padding:24px;color:#64748b;">Loading...</div>
  </div>

  <div class="footer-link">
    <a href="https://identity.northr.ai" target="_blank">identity.northr.ai</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
